# ~/.tmux.conf

# Help
bind -n F1 display-popup -w 60 -h 40 -E 'less ~/.tmux/tmux-help'

# Leader
set -g prefix C-s
unbind C-b
bind C-s send-prefix

# General
set -s escape-time 0
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -as terminal-features 'screen*:extkeys'
set -as terminal-features 'tmux-256color:extkeys'
set -g allow-passthrough on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g mouse on
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Vim commands
set -s command-alias[10] sp='split-window -v -c "#{pane_current_path}"'
set -s command-alias[11] vs='split-window -h -c "#{pane_current_path}"'
set -s command-alias[12] q='kill-pane'
set -s command-alias[13] qa='kill-window'
set -s command-alias[14] w='detach-client'
set -s command-alias[15] wq='detach-client'

# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind w select-pane -t :.+

# Pane resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Windows
bind . new-window -c "#{pane_current_path}"
bind [ previous-window
bind ] next-window
bind Tab last-window
bind , command-prompt -I "#W" "rename-window '%%'"

# Sessions & Windows
bind -n F2 choose-tree -Z

# Claude sessions (fzf switcher: jump to / resume a running Claude session)
bind -n F3 display-popup -w 80% -h 60% -E '/opt/homebrew/bin/bash ~/.claude/scripts/tmux-claude-switcher.sh'

# Other
bind z resize-pane -Z
bind r source-file ~/.tmux.conf \; display "Reloaded"

# Copy mode
setw -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi q send -X cancel
bind p paste-buffer

# Shift enter
bind-key -n S-Enter send-keys Escape "[13;2u"

# Status bar
set -g status-style bg=white,fg=black
set -g status-left "#{?pane_in_mode,#[bg=red fg=white] COPY #[bg=white fg=black] ,#{?client_prefix,#[bg=yellow] C-s #[bg=white] ,}}[#S] "
# Continuum injection musí být součástí status-right natvrdo - jinak ji
# `prefix+r` (source-file) přepíše a continuum přestane savovat.
set -g status-right "#(/Users/ondra/.tmux/plugins/tmux-continuum/scripts/continuum_save.sh)%H:%M"
set -g window-status-separator "#[fg=colour250]│"
set -g window-status-format "#[fg=colour16] #{?@cc_status,#{@cc_status} ,}#I:#W "
set -g window-status-current-format "#[bg=black,fg=white,bold] #{?@cc_status,#{@cc_status} ,}#I:#W "
set -g pane-active-border-style fg=green
set -g window-style bg=colour238
set -g window-active-style bg=terminal

# Claude session status daemon
# Razítkuje okna s běžící Claude session ikonou stavu (@cc_status) – viz
# window-status-format výše. Pidfile guard ve skriptu zajistí, že reload
# (prefix+r) starý daemon zabije a převezme; PATH si skript nastaví sám.
# Interpreter musí být brew bash 5+ (declare -A); systémový /bin/bash 3.2
# v tmux PATH stíní homebrew, proto cesta natvrdo.
run-shell -b '/opt/homebrew/bin/bash ~/.claude/scripts/tmux-claude-status.sh 3'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Session persistence
# Save běží automaticky každou minutu (přes status-right interpolaci výše).
# Restore se provede automaticky při startu tmux serveru.
set -g @resurrect-dir '~/.tmux/resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
# Tilda prefix = regex match kdekoli v command stringu (kvuli plnym cestam
# jako /Users/ondra/.local/bin/claude). Bez tildy by resurrect cekal, ze
# command zacina presne "claude" - coz se kvuli abs. path nestane.
set -g @resurrect-processes '~ssh ~psql ~mysql ~sqlite3 ~vim ~nvim ~claude "~git log"'
set -g @continuum-save-interval '1'

# Run TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
